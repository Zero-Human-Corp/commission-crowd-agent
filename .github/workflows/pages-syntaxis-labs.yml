name: Publish Syntaxis Labs to GitHub Pages

# NOTE: This workflow is DISABLED-BY-DEFAULT.
# It only runs when manually triggered via workflow_dispatch.
# Do not enable automatic triggers (push, schedule) without explicit operator approval.
#
# To publish:
#   1. Operator reviews and approves the site content
#   2. Go to GitHub Actions → this workflow → Run workflow
#   3. Select branch (usually master)
#   4. Click "Run workflow"
#
# To rollback:
#   1. Re-run the workflow from a previous commit
#   2. Or disable Pages in repository settings

on:
  workflow_dispatch:
    # No inputs required — simple manual trigger
    # Future: could add environment input (prod/staging)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Only fetch the sites directory — minimal checkout
          sparse-checkout: |
            sites/syntaxis-labs/
          sparse-checkout-cone-mode: false

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Static HTML site — no Jekyll processing needed
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy only the syntaxis-labs site files
          path: sites/syntaxis-labs/
          name: syntaxis-labs-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: syntaxis-labs-site
