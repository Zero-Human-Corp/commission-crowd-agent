<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120" role="img" aria-label="Abstract partnership diagram showing connected vendor and sales partner nodes">
  <defs>
    <linearGradient id="partGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Vendor node -->
  <rect x="20" y="30" width="80" height="60" rx="12" fill="#0f172a" stroke="#2563eb" stroke-width="2.5"/>
  <rect x="36" y="50" width="48" height="6" rx="3" fill="#2563eb"/>
  <rect x="44" y="62" width="32" height="6" rx="3" fill="#2563eb" opacity="0.5"/>
  <text x="60" y="110" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" font-weight="600">VENDOR</text>

  <!-- Bidirectional connection -->
  <line x1="110" y1="55" x2="200" y2="55" stroke="url(#partGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="110" y1="65" x2="200" y2="65" stroke="url(#partGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Arrow heads -->
  <polygon points="195,55 185,50 185,60" fill="#10b981"/>
  <polygon points="115,65 125,70 125,60" fill="#2563eb"/>

  <!-- Partner node -->
  <rect x="220" y="30" width="80" height="60" rx="12" fill="#0f172a" stroke="#10b981" stroke-width="2.5"/>
  <circle cx="260" cy="60" r="14" fill="none" stroke="#10b981" stroke-width="2.5"/>
  <circle cx="260" cy="60" r="5" fill="#10b981"/>
  <text x="260" y="110" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" font-weight="600">PARTNER</text>
</svg>